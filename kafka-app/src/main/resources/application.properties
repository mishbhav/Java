spring.application.name=kafka
# App port
server.port=8080

# Kafka Broker connection
spring.kafka.bootstrap-servers=localhost:9092

# Producer serialization (String keys, JSON values)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Consumer deserialization
spring.kafka.consumer.group-id=tutor-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Crucial: Allow Jackson to trust your data model package during decoding
spring.kafka.consumer.properties.spring.json.trusted.packages=com.tutor.kafka.model


# Disable auto-commits so we can control them manually in code
spring.kafka.consumer.enable-auto-commit=false

# Tell Spring to listen for our manual container acknowledgments
spring.kafka.listener.ack-mode=manual_immediate


# Enable Idempotence (guarantees order and no duplicates on retries)
spring.kafka.producer.properties.enable.idempotence=true

# Request acknowledgments from all in-sync replica nodes before succeeding
spring.kafka.producer.acks=all

# Allow infinite retries for transient network failures
spring.kafka.producer.retries=2147483647

# Maximize inflight requests per network connection while keeping safe ordering
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5

# Unique application ID for this specific streaming pipeline
spring.kafka.streams.application-id=tutor-streams-pipeline
spring.kafka.streams.bootstrap-servers=localhost:9092

# Default Serdes (Serializer/Deserializer) for the streaming workflow
spring.kafka.streams.properties.default.key.serde=org.apache.kafka.common.serialization.Serdes$StringSerde
spring.kafka.streams.properties.default.value.serde=org.apache.kafka.common.serialization.Serdes$StringSerde
